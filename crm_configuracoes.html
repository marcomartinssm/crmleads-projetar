<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Configurações – CRM</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0f0a00;--bg2:#1a1200;--bg3:#221800;--card:#1f1500;--border:#3d2e00;--acc:#f97316;--acc-dark:#ea6c0a;--acc-pale:#3a1f00;--acc-text:#fdba74;--text:#f0e8d8;--text-muted:#8a7a60;--success:#22c55e;--success-bg:#0a2010;--danger:#ef4444;--danger-bg:#200a0a;--radius:10px;--sw:240px;--swc:60px;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    a{text-decoration:none;color:inherit;}
    .sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sw);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;transition:width .25s;overflow:hidden;}
    .sidebar.col{width:var(--swc);}
    .sb-top{padding:16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);min-height:60px;gap:8px;}
    .sb-brand{display:flex;align-items:center;gap:10px;overflow:hidden;flex:1;}
    .sb-icon{width:32px;height:32px;background:var(--acc);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
    .sb-name{font-size:14px;font-weight:700;white-space:nowrap;transition:opacity .2s;}
    .sb-name span{color:var(--acc);}
    .btn-tog{background:none;border:1px solid var(--border);color:var(--text-muted);width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
    .btn-tog:hover{border-color:var(--acc);color:var(--acc);}
    .sb-nav{padding:10px 8px;flex:1;}
    .nav-i{display:flex;align-items:center;gap:12px;padding:10px;border-radius:8px;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all .2s;white-space:nowrap;}
    .nav-i:hover{background:var(--bg3);color:var(--text);}
    .nav-i.on{background:var(--acc-pale);color:var(--acc-text);border-left:3px solid var(--acc);}
    .nav-ic{font-size:17px;flex-shrink:0;width:20px;text-align:center;}
    .nav-lbl{overflow:hidden;transition:opacity .15s,width .15s;}
    .sidebar.col .nav-lbl,.sidebar.col .sb-name{opacity:0;width:0;}
    .sidebar.col .nav-i{justify-content:center;}
    .sidebar.col .nav-i.on{border-left:none;border-radius:8px;}
    .main{margin-left:var(--sw);min-height:100vh;padding:28px 32px;transition:margin-left .25s;}
    .main.col{margin-left:var(--swc);}
    .page-header{margin-bottom:22px;}
    .page-title{font-size:22px;font-weight:800;}
    .page-sub{font-size:12px;color:var(--text-muted);margin-top:3px;}
    .grid-cfg{display:grid;grid-template-columns:300px 1fr;gap:20px;align-items:start;}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
    .card-hd{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .card-title{font-size:14px;font-weight:700;}
    .card-body{padding:14px 18px;}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .2s;}
    .btn-acc{background:var(--acc);color:#fff;}
    .btn-acc:hover{background:var(--acc-dark);}
    .btn-sm{padding:5px 10px;font-size:11px;}
    .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text-muted);}
    .btn-ghost:hover{border-color:var(--acc);color:var(--acc);}
    .btn-danger{background:var(--danger-bg);border:1px solid #5a1a1a;color:var(--danger);}
    .btn-danger:hover{background:#2a0a0a;}
    .fi-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:7px;border:1px solid var(--border);margin-bottom:6px;cursor:pointer;transition:all .2s;}
    .fi-item:hover{border-color:var(--acc-dark);background:var(--bg3);}
    .fi-item.sel{border-color:var(--acc);background:var(--acc-pale);}
    .fi-nome{font-size:13px;font-weight:600;}
    .fi-cnt{font-size:11px;color:var(--text-muted);margin-top:2px;}
    .fi-acts{display:flex;gap:5px;opacity:0;transition:opacity .2s;}
    .fi-item:hover .fi-acts{opacity:1;}
    .fa-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:7px;border:1px solid var(--border);margin-bottom:7px;transition:all .2s;}
    .fa-item:hover{border-color:var(--acc-dark);}
    .fa-drag{cursor:grab;color:var(--text-muted);font-size:15px;padding:0 3px;}
    .fa-drag:active{cursor:grabbing;}
    .fa-cor{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
    .fa-ord{font-size:11px;color:var(--text-muted);width:18px;text-align:center;}
    .fa-nome{flex:1;font-size:13px;font-weight:600;}
    .fa-acts{display:flex;gap:5px;opacity:0;transition:opacity .2s;}
    .fa-item:hover .fa-acts{opacity:1;}
    .empty{text-align:center;padding:36px;color:var(--text-muted);font-size:13px;}
    .hint{font-size:11px;color:var(--text-muted);margin-top:8px;font-style:italic;}
    .mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;}
    .mo.open{display:flex;}
    .modal{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px;width:100%;max-width:400px;}
    .modal-title{font-size:16px;font-weight:800;margin-bottom:18px;}
    .fg{margin-bottom:12px;}
    .fl{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:5px;}
    .fi{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:7px;font-family:'Inter',sans-serif;font-size:13px;color:var(--text);background:var(--bg3);outline:none;transition:border-color .2s;}
    .fi:focus{border-color:var(--acc);}
    .cor-pk{display:flex;gap:7px;flex-wrap:wrap;margin-top:5px;}
    .cor-o{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s;}
    .cor-o.sel{border-color:var(--text);transform:scale(1.2);}
    .ma{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;}
    .toast{position:fixed;bottom:24px;right:24px;background:var(--success);color:#fff;padding:10px 20px;border-radius:9px;font-size:13px;font-weight:600;display:none;z-index:999;}
  </style>
</head>
<body>
<div class="sidebar" id="sb">
  <div class="sb-top">
    <div class="sb-brand">
      <div class="sb-icon">🏠</div>
      <div class="sb-name">CRM <span>Leads</span></div>
    </div>
    <button class="btn-tog" onclick="tog()">☰</button>
  </div>
  <nav class="sb-nav">
    <a class="nav-i" href="crm_dashboard.html"><span class="nav-ic">📊</span><span class="nav-lbl">Dashboard</span></a>
    <a class="nav-i" href="crm_leads.html"><span class="nav-ic">👥</span><span class="nav-lbl">Leads</span></a>
    <a class="nav-i" href="crm_corretores.html"><span class="nav-ic">🏢</span><span class="nav-lbl">Corretores</span></a>
    <a class="nav-i on" href="crm_configuracoes.html"><span class="nav-ic">🔧</span><span class="nav-lbl">Configurações</span></a>
  </nav>
  <div style="padding:12px 8px;border-top:1px solid var(--border);">
    <button onclick="logout()" style="display:flex;align-items:center;gap:12px;width:100%;padding:10px;border-radius:8px;background:none;border:none;color:var(--text-muted);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;" onmouseover="this.style.background='var(--bg3)';this.style.color='var(--danger)'" onmouseout="this.style.background='none';this.style.color='var(--text-muted)'">
      <span style="font-size:17px;width:20px;text-align:center;">🚪</span>
      <span class="nav-lbl">Sair</span>
    </button>
  </div>
</div>
<div class="main" id="main">
  <div class="page-header">
    <div class="page-title">Configurações</div>
    <div class="page-sub">Gerencie funis e fases do CRM</div>
  </div>
  <div class="grid-cfg">
    <div class="card">
      <div class="card-hd"><div class="card-title">Funis</div><button class="btn btn-acc btn-sm" onclick="abrirMoFunil()">+ Novo</button></div>
      <div class="card-body"><div id="fl"></div><p class="hint">Clique em um funil para ver suas fases →</p></div>
    </div>
    <div class="card">
      <div class="card-hd"><div class="card-title" id="fa-title">Selecione um funil</div><button class="btn btn-acc btn-sm" id="btn-nf" onclick="abrirMoFase()" style="display:none;">+ Nova Fase</button></div>
      <div class="card-body"><div id="fal"><div class="empty">← Selecione um funil</div></div></div>
    </div>
  </div>
</div>
<div class="mo" id="mo-funil">
  <div class="modal">
    <div class="modal-title" id="mf-title">Novo Funil</div>
    <input type="hidden" id="ef-id"/>
    <div class="fg"><label class="fl">Nome</label><input class="fi" type="text" id="ef-nome" placeholder="Ex: Pré Atendimento"/></div>
    <div class="ma"><button class="btn btn-ghost" onclick="fMo('mo-funil')">Cancelar</button><button class="btn btn-acc" onclick="salvarFunil()">Salvar</button></div>
  </div>
</div>
<div class="mo" id="mo-fase">
  <div class="modal">
    <div class="modal-title" id="mfa-title">Nova Fase</div>
    <input type="hidden" id="efa-id"/>
    <div class="fg"><label class="fl">Nome</label><input class="fi" type="text" id="efa-nome" placeholder="Ex: Novo Lead"/></div>
    <div class="fg"><label class="fl">Cor</label>
      <div class="cor-pk" id="cp">
        <div class="cor-o sel" data-c="#f97316" style="background:#f97316;"></div>
        <div class="cor-o" data-c="#22c55e" style="background:#22c55e;"></div>
        <div class="cor-o" data-c="#3b82f6" style="background:#3b82f6;"></div>
        <div class="cor-o" data-c="#8b5cf6" style="background:#8b5cf6;"></div>
        <div class="cor-o" data-c="#ef4444" style="background:#ef4444;"></div>
        <div class="cor-o" data-c="#facc15" style="background:#facc15;"></div>
        <div class="cor-o" data-c="#64748b" style="background:#64748b;"></div>
        <div class="cor-o" data-c="#f0e8d8" style="background:#f0e8d8;"></div>
      </div>
    </div>
    <div class="ma"><button class="btn btn-ghost" onclick="fMo('mo-fase')">Cancelar</button><button class="btn btn-acc" onclick="salvarFase()">Salvar</button></div>
  </div>
</div>
<div class="mo" id="mo-conf">
  <div class="modal">
    <div class="modal-title">Confirmar exclusão</div>
    <p id="mc-txt" style="font-size:13px;color:var(--text-muted);margin-bottom:18px;"></p>
    <div class="ma"><button class="btn btn-ghost" onclick="fMo('mo-conf')">Cancelar</button><button class="btn btn-danger" id="btn-conf">Excluir</button></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>

  const SB='https://jgdbnkwhmesgjvsymgma.supabase.co';
  const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpnZGJua3dobWVzZ2p2c3ltZ21hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MjAxODUsImV4cCI6MjA5MDQ5NjE4NX0.2KUPjnJE9vhzYviho16e3afWxyQL0usSjKXf2TLV00Q';

  function getSession(){try{const s=localStorage.getItem('crm_session');if(!s)return null;const sess=JSON.parse(s);if(sess.expires_at<Date.now()/1000){localStorage.removeItem('crm_session');return null;}return sess;}catch(e){return null;}}
  function getHeaders(){const sess=getSession();if(!sess){window.location.href='crm_login.html';return null;}return{'apikey':SK,'Authorization':`Bearer ${sess.access_token}`,'Content-Type':'application/json','Prefer':'return=representation'};}
  function checkAuth(){const sess=getSession();if(!sess)window.location.href='crm_login.html';return sess;}
  function logout(){localStorage.removeItem('crm_session');window.location.href='crm_login.html';}

  let funis=[],fases=[],funilSel=null,corSel='#f97316';
  function tog(){document.getElementById('sb').classList.toggle('col');document.getElementById('main').classList.toggle('col');}
  checkAuth();
  const H=getHeaders();if(!H)return;
  async function init(){
    const[rf,rfa]=await Promise.all([fetch(`${SB}/rest/v1/funis?order=ordem`,{headers:H}),fetch(`${SB}/rest/v1/fases?order=ordem`,{headers:H})]);
    funis=await rf.json();fases=await rfa.json();renderFunis();
  }
  function renderFunis(){
    const c=document.getElementById('fl');
    if(!funis.length){c.innerHTML='<div class="empty">Nenhum funil</div>';return;}
    c.innerHTML=funis.map(f=>{
      const q=fases.filter(fa=>fa.funil_id===f.id).length;
      const s=funilSel?.id===f.id?' sel':'';
      return `<div class="fi-item${s}" onclick="selFunil('${f.id}')">
        <div><div class="fi-nome">${f.nome}</div><div class="fi-cnt">${q} fase${q!==1?'s':''}</div></div>
        <div class="fi-acts">
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();editFunil('${f.id}')">✏️</button>
          <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();confExcFunil('${f.id}','${f.nome}')">🗑️</button>
        </div></div>`;
    }).join('');
  }
  function selFunil(id){funilSel=funis.find(f=>f.id===id);renderFunis();renderFases();document.getElementById('fa-title').textContent=`Fases — ${funilSel.nome}`;document.getElementById('btn-nf').style.display='inline-flex';}
  function renderFases(){
    const c=document.getElementById('fal');if(!funilSel)return;
    const fd=fases.filter(f=>f.funil_id===funilSel.id);
    if(!fd.length){c.innerHTML='<div class="empty">Nenhuma fase<br><small>Clique em "+ Nova Fase"</small></div>';return;}
    c.innerHTML=fd.map(fa=>`<div class="fa-item" draggable="true" data-id="${fa.id}" data-ord="${fa.ordem}">
      <span class="fa-drag">⠿</span>
      <div class="fa-cor" style="background:${fa.cor||'#f97316'};"></div>
      <span class="fa-ord">${fa.ordem}</span>
      <span class="fa-nome">${fa.nome}</span>
      <div class="fa-acts">
        <button class="btn btn-ghost btn-sm" onclick="editFase('${fa.id}')">✏️</button>
        <button class="btn btn-danger btn-sm" onclick="confExcFase('${fa.id}','${fa.nome}')">🗑️</button>
      </div></div>`).join('');
    ativarDrag();
  }
  function ativarDrag(){
    const items=document.querySelectorAll('.fa-item');let drag=null;
    items.forEach(it=>{
      it.addEventListener('dragstart',()=>{drag=it;it.style.opacity='.4';});
      it.addEventListener('dragend',()=>{drag=null;it.style.opacity='1';});
      it.addEventListener('dragover',e=>{e.preventDefault();if(drag&&drag!==it)it.style.borderColor='var(--acc)';});
      it.addEventListener('dragleave',()=>it.style.borderColor='');
      it.addEventListener('drop',async e=>{
        e.preventDefault();it.style.borderColor='';
        if(!drag||drag===it)return;
        const fd=fases.filter(f=>f.funil_id===funilSel.id);
        const fA=fd.find(f=>f.id===drag.dataset.id),fB=fd.find(f=>f.id===it.dataset.id);
        if(!fA||!fB)return;
        const oA=fA.ordem,oB=fB.ordem;fA.ordem=oB;fB.ordem=oA;
        await Promise.all([
          fetch(`${SB}/rest/v1/fases?id=eq.${fA.id}`,{method:'PATCH',headers:H,body:JSON.stringify({ordem:oB})}),
          fetch(`${SB}/rest/v1/fases?id=eq.${fB.id}`,{method:'PATCH',headers:H,body:JSON.stringify({ordem:oA})})
        ]);
        renderFases();toast('Ordem atualizada!');
      });
    });
  }
  function abrirMoFunil(){document.getElementById('ef-id').value='';document.getElementById('ef-nome').value='';document.getElementById('mf-title').textContent='Novo Funil';document.getElementById('mo-funil').classList.add('open');}
  function editFunil(id){const f=funis.find(x=>x.id===id);if(!f)return;document.getElementById('ef-id').value=f.id;document.getElementById('ef-nome').value=f.nome;document.getElementById('mf-title').textContent='Editar Funil';document.getElementById('mo-funil').classList.add('open');}
  async function salvarFunil(){
    const id=document.getElementById('ef-id').value,nome=document.getElementById('ef-nome').value.trim();
    if(!nome){alert('Nome obrigatório!');return;}
    if(id){await fetch(`${SB}/rest/v1/funis?id=eq.${id}`,{method:'PATCH',headers:H,body:JSON.stringify({nome})});toast('Funil atualizado!');}
    else{await fetch(`${SB}/rest/v1/funis`,{method:'POST',headers:H,body:JSON.stringify({nome,ordem:funis.length+1})});toast('Funil criado!');}
    fMo('mo-funil');await reload();renderFunis();if(funilSel)renderFases();
  }
  function confExcFunil(id,nome){document.getElementById('mc-txt').textContent=`Excluir funil "${nome}"? Todas as fases serão removidas.`;document.getElementById('btn-conf').onclick=()=>excFunil(id);document.getElementById('mo-conf').classList.add('open');}
  async function excFunil(id){
    await fetch(`${SB}/rest/v1/fases?funil_id=eq.${id}`,{method:'DELETE',headers:H});
    await fetch(`${SB}/rest/v1/funis?id=eq.${id}`,{method:'DELETE',headers:H});
    if(funilSel?.id===id){funilSel=null;document.getElementById('fal').innerHTML='<div class="empty">← Selecione um funil</div>';document.getElementById('fa-title').textContent='Selecione um funil';document.getElementById('btn-nf').style.display='none';}
    fMo('mo-conf');await reload();renderFunis();toast('Funil excluído!');
  }
  function abrirMoFase(){document.getElementById('efa-id').value='';document.getElementById('efa-nome').value='';document.getElementById('mfa-title').textContent='Nova Fase';corSel='#f97316';document.querySelectorAll('.cor-o').forEach(c=>c.classList.toggle('sel',c.dataset.c===corSel));document.getElementById('mo-fase').classList.add('open');}
  function editFase(id){const fa=fases.find(x=>x.id===id);if(!fa)return;document.getElementById('efa-id').value=fa.id;document.getElementById('efa-nome').value=fa.nome;document.getElementById('mfa-title').textContent='Editar Fase';corSel=fa.cor||'#f97316';document.querySelectorAll('.cor-o').forEach(c=>c.classList.toggle('sel',c.dataset.c===corSel));document.getElementById('mo-fase').classList.add('open');}
  async function salvarFase(){
    const id=document.getElementById('efa-id').value,nome=document.getElementById('efa-nome').value.trim();
    if(!nome){alert('Nome obrigatório!');return;}
    if(id){await fetch(`${SB}/rest/v1/fases?id=eq.${id}`,{method:'PATCH',headers:H,body:JSON.stringify({nome,cor:corSel})});toast('Fase atualizada!');}
    else{const q=fases.filter(f=>f.funil_id===funilSel.id).length;await fetch(`${SB}/rest/v1/fases`,{method:'POST',headers:H,body:JSON.stringify({nome,cor:corSel,funil_id:funilSel.id,ordem:q+1})});toast('Fase criada!');}
    fMo('mo-fase');await reload();renderFases();
  }
  function confExcFase(id,nome){document.getElementById('mc-txt').textContent=`Excluir fase "${nome}"?`;document.getElementById('btn-conf').onclick=()=>excFase(id);document.getElementById('mo-conf').classList.add('open');}
  async function excFase(id){await fetch(`${SB}/rest/v1/fases?id=eq.${id}`,{method:'DELETE',headers:H});fMo('mo-conf');await reload();renderFases();toast('Fase excluída!');}
  async function reload(){
    const[rf,rfa]=await Promise.all([fetch(`${SB}/rest/v1/funis?order=ordem`,{headers:H}),fetch(`${SB}/rest/v1/fases?order=ordem`,{headers:H})]);
    funis=await rf.json();fases=await rfa.json();
  }
  function fMo(id){document.getElementById(id).classList.remove('open');}
  document.querySelectorAll('.mo').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');}));
  document.getElementById('cp').addEventListener('click',e=>{const o=e.target.closest('.cor-o');if(!o)return;corSel=o.dataset.c;document.querySelectorAll('.cor-o').forEach(c=>c.classList.toggle('sel',c===o));});
  function toast(m){const t=document.getElementById('toast');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',3000);}
  init();
</script>
</body>
</html>
