<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – CRM</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0f0a00;--bg2:#1a1200;--bg3:#221800;--card:#1f1500;--border:#3d2e00;--acc:#f97316;--acc-dark:#ea6c0a;--acc-pale:#3a1f00;--acc-text:#fdba74;--text:#f0e8d8;--text-muted:#8a7a60;--danger:#ef4444;--radius:10px;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .wrap{width:100%;max-width:380px;padding:24px;}
    .logo{text-align:center;margin-bottom:32px;}
    .logo-icon{width:56px;height:56px;background:var(--acc);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 14px;}
    .logo-name{font-size:20px;font-weight:800;}
    .logo-name span{color:var(--acc);}
    .logo-sub{font-size:12px;color:var(--text-muted);margin-top:4px;}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px;}
    .card-title{font-size:16px;font-weight:700;margin-bottom:20px;}
    .fg{margin-bottom:14px;}
    .fl{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:6px;}
    .fi{width:100%;padding:10px 13px;border:1px solid var(--border);border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;color:var(--text);background:var(--bg3);outline:none;transition:border-color .2s;}
    .fi:focus{border-color:var(--acc);}
    .btn-login{width:100%;padding:11px;background:var(--acc);color:#fff;border:none;border-radius:8px;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px;transition:background .2s;}
    .btn-login:hover{background:var(--acc-dark);}
    .btn-login:disabled{opacity:.6;cursor:not-allowed;}
    .erro{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--danger);padding:10px 13px;border-radius:8px;font-size:12px;margin-bottom:14px;display:none;}
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-icon">🏠</div>
    <div class="logo-name">CRM <span>Leads</span></div>
    <div class="logo-sub">Acesso restrito</div>
  </div>
  <div class="card">
    <div class="card-title">Entrar</div>
    <div class="erro" id="erro"></div>
    <div class="fg"><label class="fl">Email</label><input class="fi" type="email" id="email" placeholder="seu@email.com"/></div>
    <div class="fg"><label class="fl">Senha</label><input class="fi" type="password" id="senha" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()"/></div>
    <button class="btn-login" id="btnLogin" onclick="login()">Entrar</button>
  </div>
</div>
<script>
  const SB='https://jgdbnkwhmesgjvsymgma.supabase.co';
  const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpnZGJua3dobWVzZ2p2c3ltZ21hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MjAxODUsImV4cCI6MjA5MDQ5NjE4NX0.2KUPjnJE9vhzYviho16e3afWxyQL0usSjKXf2TLV00Q';

  // Verifica se já está logado
  const sess = localStorage.getItem('crm_session');
  if(sess) {
    try {
      const s = JSON.parse(sess);
      if(s.expires_at > Date.now()/1000) window.location.href='crm_dashboard.html';
    } catch(e) { localStorage.removeItem('crm_session'); }
  }

  async function login() {
    const email=document.getElementById('email').value.trim();
    const senha=document.getElementById('senha').value;
    const btn=document.getElementById('btnLogin');
    const erro=document.getElementById('erro');
    erro.style.display='none';
    if(!email||!senha){erro.textContent='Preencha email e senha.';erro.style.display='block';return;}
    btn.disabled=true;btn.textContent='Entrando...';
    try {
      const res=await fetch(`${SB}/auth/v1/token?grant_type=password`,{
        method:'POST',
        headers:{'apikey':SK,'Content-Type':'application/json'},
        body:JSON.stringify({email,password:senha})
      });
      const data=await res.json();
      if(data.access_token) {
        localStorage.setItem('crm_session',JSON.stringify({
          access_token:data.access_token,
          refresh_token:data.refresh_token,
          expires_at:data.expires_at
        }));
        window.location.href='crm_dashboard.html';
      } else {
        erro.textContent='Email ou senha incorretos.';
        erro.style.display='block';
      }
    } catch(e) {
      erro.textContent='Erro de conexão. Tente novamente.';
      erro.style.display='block';
    }
    btn.disabled=false;btn.textContent='Entrar';
  }
</script>
</body>
</html>
