<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leads – CRM</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0f0a00;--bg2:#1a1200;--bg3:#221800;--card:#1f1500;--border:#3d2e00;--acc:#f97316;--acc-dark:#ea6c0a;--acc-pale:#3a1f00;--acc-text:#fdba74;--text:#f0e8d8;--text-muted:#8a7a60;--success:#22c55e;--success-bg:#0a2010;--danger:#ef4444;--danger-bg:#200a0a;--radius:10px;--sw:240px;--swc:60px;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    a{text-decoration:none;color:inherit;}
    .sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sw);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;transition:width .25s;overflow:hidden;}
    .sidebar.col{width:var(--swc);}
    .sb-top{padding:16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);min-height:60px;gap:8px;}
    .sb-brand{display:flex;align-items:center;gap:10px;overflow:hidden;flex:1;}
    .sb-icon{width:32px;height:32px;background:var(--acc);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
    .sb-name{font-size:14px;font-weight:700;white-space:nowrap;transition:opacity .2s;}
    .sb-name span{color:var(--acc);}
    .btn-tog{background:none;border:1px solid var(--border);color:var(--text-muted);width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
    .btn-tog:hover{border-color:var(--acc);color:var(--acc);}
    .sb-nav{padding:10px 8px;flex:1;}
    .nav-i{display:flex;align-items:center;gap:12px;padding:10px;border-radius:8px;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all .2s;white-space:nowrap;}
    .nav-i:hover{background:var(--bg3);color:var(--text);}
    .nav-i.on{background:var(--acc-pale);color:var(--acc-text);border-left:3px solid var(--acc);}
    .nav-ic{font-size:17px;flex-shrink:0;width:20px;text-align:center;}
    .nav-lbl{overflow:hidden;transition:opacity .15s,width .15s;}
    .sidebar.col .nav-lbl,.sidebar.col .sb-name{opacity:0;width:0;}
    .sidebar.col .nav-i{justify-content:center;}
    .sidebar.col .nav-i.on{border-left:none;border-radius:8px;}
    .main{margin-left:var(--sw);min-height:100vh;padding:28px 32px;transition:margin-left .25s;}
    .main.col{margin-left:var(--swc);}
    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
    .page-title{font-size:22px;font-weight:800;}
    .page-sub{font-size:12px;color:var(--text-muted);margin-top:3px;}
    .toolbar{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .sw{position:relative;flex:1;min-width:160px;}
    .sw input{width:100%;padding:7px 12px 7px 32px;border:1px solid var(--border);border-radius:7px;font-family:'Inter',sans-serif;font-size:12px;color:var(--text);background:var(--bg3);outline:none;transition:border-color .2s;}
    .sw input:focus{border-color:var(--acc);}
    .sw-ic{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:13px;}
    .fsel{padding:7px 10px;border:1px solid var(--border);border-radius:7px;font-family:'Inter',sans-serif;font-size:12px;color:var(--text);background:var(--bg3);outline:none;cursor:pointer;transition:border-color .2s;}
    .fsel:focus{border-color:var(--acc);}
    .vtog{display:flex;border:1px solid var(--border);border-radius:7px;overflow:hidden;margin-left:auto;}
    .vbtn{padding:6px 14px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;border:none;background:transparent;color:var(--text-muted);cursor:pointer;transition:all .2s;}
    .vbtn.on{background:var(--acc);color:#fff;}
    .btn-novo{padding:7px 16px;background:var(--acc);color:#fff;border:none;border-radius:7px;font-family:'Inter',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:background .2s;white-space:nowrap;}
    .btn-novo:hover{background:var(--acc-dark);}
    .tc{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
    table{width:100%;border-collapse:collapse;}
    th{text-align:left;padding:10px 16px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted);background:var(--bg3);border-bottom:1px solid var(--border);}
    td{padding:11px 16px;font-size:13px;border-bottom:1px solid var(--border);}
    tr:last-child td{border-bottom:none;}
    tr:hover td{background:var(--bg3);cursor:pointer;}
    .av{width:30px;height:30px;border-radius:50%;background:var(--acc);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
    .li{display:flex;align-items:center;gap:9px;}
    .ln{font-weight:600;font-size:13px;}
    .badge{display:inline-block;padding:2px 8px;border-radius:50px;font-size:11px;font-weight:600;}
    .bp{background:#3a1f00;color:#fdba74;}
    .ba{background:#2a1f00;color:#fcd34d;}
    .bn{background:#0a2010;color:#86efac;}
    .ft{font-size:12px;color:var(--text-muted);margin-top:2px;}
    .kb{display:none;}
    .kboard{display:flex;gap:14px;overflow-x:auto;padding-bottom:10px;}
    .kcol{min-width:210px;flex-shrink:0;}
    .kch{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--card);border:1px solid var(--border);border-bottom:2px solid var(--acc);border-radius:8px 8px 0 0;margin-bottom:7px;}
    .kcn{font-size:12px;font-weight:700;}
    .kcc{background:var(--acc-pale);color:var(--acc-text);padding:2px 8px;border-radius:50px;font-size:11px;font-weight:700;}
    .kcard{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:11px 13px;margin-bottom:7px;cursor:pointer;transition:all .2s;}
    .kcard:hover{border-color:var(--acc-dark);}
    .kcard[draggable=true]{cursor:grab;}
    .kcard[draggable=true]:active{cursor:grabbing;}
    .kn{font-size:12px;font-weight:600;margin-bottom:5px;}
    .ki{font-size:11px;color:var(--text-muted);display:flex;flex-direction:column;gap:2px;}
    .kt{display:inline-block;padding:2px 6px;border-radius:50px;font-size:10px;font-weight:600;background:var(--acc-pale);color:var(--acc-text);margin-top:5px;}
    .kaviso{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:50px;text-align:center;color:var(--text-muted);font-size:14px;}
    .kaviso strong{display:block;font-size:16px;font-weight:700;color:var(--text);margin-bottom:8px;}
    .mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:flex-start;justify-content:flex-end;}
    .mo.open{display:flex;}
    .mside{background:var(--card);width:400px;height:100vh;overflow-y:auto;border-left:1px solid var(--border);padding:28px;position:relative;animation:sli .22s ease;}
    @keyframes sli{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}
    .mc{position:absolute;top:20px;right:20px;background:none;border:none;font-size:18px;cursor:pointer;color:var(--text-muted);}
    .dh{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid var(--border);}
    .dav{width:48px;height:48px;border-radius:50%;background:var(--acc);color:#fff;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;flex-shrink:0;}
    .dn{font-size:16px;font-weight:800;}
    .ds{font-size:12px;color:var(--text-muted);margin-top:3px;}
    .dsec{margin-bottom:20px;}
    .dsec-t{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);margin-bottom:10px;}
    .dr{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;}
    .dr:last-child{border-bottom:none;}
    .dk{color:var(--text-muted);}
    .dv{font-weight:600;}
    .sel-i{padding:5px 9px;border:1px solid var(--border);border-radius:6px;font-family:'Inter',sans-serif;font-size:12px;color:var(--text);background:var(--bg3);outline:none;}
    .sel-i:focus{border-color:var(--acc);}
    .inp-i{padding:5px 9px;border:1px solid var(--border);border-radius:6px;font-family:'Inter',sans-serif;font-size:12px;color:var(--text);background:var(--bg3);outline:none;width:100%;}
    .inp-i:focus{border-color:var(--acc);}
    .btn-s{padding:7px 16px;background:var(--acc);color:#fff;border:none;border-radius:7px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;margin-top:7px;transition:background .2s;}
    .btn-s:hover{background:var(--acc-dark);}
    .btn-s:disabled{opacity:.5;cursor:not-allowed;}
    .ii{padding:9px 0;border-bottom:1px solid var(--border);}
    .ii:last-child{border-bottom:none;}
    .iih{display:flex;justify-content:space-between;margin-bottom:3px;}
    .iit{font-size:12px;font-weight:700;color:var(--acc-text);}
    .iid{font-size:11px;color:var(--text-muted);}
    .iidesc{font-size:12px;color:var(--text-muted);}
    .ni{margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
    .ni select,.ni textarea{width:100%;margin-bottom:7px;padding:8px 11px;border:1px solid var(--border);border-radius:7px;font-family:'Inter',sans-serif;font-size:12px;color:var(--text);background:var(--bg3);outline:none;}
    .ni select:focus,.ni textarea:focus{border-color:var(--acc);}
    .ni textarea{resize:vertical;min-height:65px;}
    .empty{text-align:center;padding:50px;color:var(--text-muted);font-size:13px;}
    .toast{position:fixed;bottom:24px;right:24px;background:var(--success);color:#fff;padding:10px 20px;border-radius:9px;font-size:13px;font-weight:600;display:none;z-index:999;}
    .toast.erro{background:var(--danger);}
    .badge-corretor{background:var(--acc-pale);color:var(--acc-text);padding:3px 10px;border-radius:50px;font-size:11px;font-weight:700;}
    .kv{display:inline-block;padding:2px 7px;border-radius:50px;font-size:10px;font-weight:700;background:#0a2010;color:#86efac;margin-top:4px;}
    .aviso-dup{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.4);color:#fca5a5;padding:10px 13px;border-radius:8px;font-size:12px;margin-bottom:12px;display:none;}
    .fg{margin-bottom:12px;}
    .fg label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:5px;}
  </style>
</head>
<body>
<div class="sidebar" id="sb">
  <div class="sb-top">
    <div class="sb-brand">
      <div class="sb-icon">🏠</div>
      <div class="sb-name">CRM <span>Leads</span></div>
    </div>
    <button class="btn-tog" onclick="tog()">☰</button>
  </div>
  <nav class="sb-nav">
    <a class="nav-i" href="crm_dashboard.html"><span class="nav-ic">📊</span><span class="nav-lbl">Dashboard</span></a>
    <a class="nav-i on" href="crm_leads.html"><span class="nav-ic">👥</span><span class="nav-lbl">Leads</span></a>
    <a class="nav-i" id="navCorretores" href="crm_corretores.html"><span class="nav-ic">🏢</span><span class="nav-lbl">Corretores</span></a>
    <a class="nav-i" id="navConfig" href="crm_configuracoes.html"><span class="nav-ic">🔧</span><span class="nav-lbl">Configurações</span></a>
  </nav>
  <div style="padding:12px 8px;border-top:1px solid var(--border);">
    <div id="infoCorretor" style="padding:10px;font-size:11px;color:var(--text-muted);display:none;">
      <span style="color:var(--acc-text);font-weight:600;" id="nomeCorretorLogado"></span>
    </div>
    <button onclick="logout()" style="display:flex;align-items:center;gap:12px;width:100%;padding:10px;border-radius:8px;background:none;border:none;color:var(--text-muted);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;" onmouseover="this.style.background='var(--bg3)';this.style.color='var(--danger)'" onmouseout="this.style.background='none';this.style.color='var(--text-muted)'">
      <span style="font-size:17px;width:20px;text-align:center;">🚪</span>
      <span class="nav-lbl">Sair</span>
    </button>
  </div>
</div>
<div class="main" id="main">
  <div class="page-header">
    <div><div class="page-title">Leads</div><div class="page-sub" id="pageSub">Gerencie todos os leads</div></div>
    <div style="display:flex;align-items:center;gap:12px;">
      <span id="tot" style="font-size:13px;color:var(--text-muted);font-weight:600;"></span>
      <button class="btn-novo" onclick="abrirNovoLead()">+ Novo Lead</button>
    </div>
  </div>
  <div class="toolbar">
    <div class="sw"><span class="sw-ic">🔍</span><input type="text" id="busca" placeholder="Buscar nome, telefone, email..." oninput="render()"/></div>
    <select class="fsel" id="fFunil" onchange="render()"><option value="">Todos os funis</option></select>
    <select class="fsel" id="fCor" onchange="render()"><option value="">Todos os corretores</option></select>
    <select class="fsel" id="fOr" onchange="render()"><option value="">Todas as origens</option></select>
    <div class="vtog">
      <button class="vbtn on" id="btnL" onclick="setV('lista')">☰ Lista</button>
      <button class="vbtn" id="btnK" onclick="setV('kanban')">⊞ Kanban</button>
    </div>
  </div>
  <div id="vLista">
    <div class="tc"><table>
      <thead><tr><th>Nome</th><th>Contato</th><th>Origem</th><th>Funil / Fase</th><th>Corretor</th><th>Valor</th><th>Entrada</th></tr></thead>
      <tbody id="tbody"><tr><td colspan="6"><div class="empty">Carregando...</div></td></tr></tbody>
    </table></div>
  </div>
  <div id="vKanban" class="kb"><div id="kc"></div></div>
</div>

<!-- Modal detalhes/edição lead -->
<div class="mo" id="mo" onclick="fMo(event)">
  <div class="mside" id="mside">
    <button class="mc" onclick="fechar()">✕</button>
    <div id="mcont">Carregando...</div>
  </div>
</div>

<!-- Modal novo lead -->
<div class="mo" id="moNovo" onclick="fMoNovo(event)">
  <div class="mside" id="msideNovo">
    <button class="mc" onclick="fecharNovo()">✕</button>
    <div id="mcontNovo">
      <div class="dh">
        <div class="dav">➕</div>
        <div><div class="dn">Novo Lead</div><div class="ds">Cadastro manual</div></div>
      </div>

      <div class="aviso-dup" id="avisoDup">⚠️ <span id="avisoDupTxt"></span></div>

      <div class="fg">
        <label>Nome *</label>
        <input class="inp-i" type="text" id="nNome" placeholder="Nome completo"/>
      </div>
      <div class="fg">
        <label>Telefone *</label>
        <input class="inp-i" type="text" id="nTelefone" placeholder="Ex: 48999999999" oninput="verificarDuplicado()"/>
      </div>
      <div class="fg">
        <label>Email</label>
        <input class="inp-i" type="email" id="nEmail" placeholder="email@exemplo.com"/>
      </div>
      <div class="fg">
        <label>Origem *</label>
        <select class="inp-i" id="nOrigem">
          <option value="">Selecione a origem...</option>
          <option>Indicação</option>
          <option>Instagram Imobiliária</option>
          <option>Instagram Corretor</option>
          <option>Anúncio Corretor</option>
          <option>Prospecção Ativa</option>
          <option>Plantão Imobiliária</option>
          <option>Placa</option>
        </select>
      </div>
      <div class="fg">
        <label>Campanha / Empreendimento</label>
        <input class="inp-i" type="text" id="nCampanha" placeholder="Ex: Residencial Aurora"/>
      </div>
      <div class="fg">
        <label>Funil *</label>
        <select class="inp-i" id="nFunil" onchange="atuFasesNovo()">
          <option value="">Selecione o funil...</option>
        </select>
      </div>
      <div class="fg">
        <label>Fase *</label>
        <select class="inp-i" id="nFase">
          <option value="">Selecione a fase...</option>
        </select>
      </div>
      <div class="fg" id="fgCorretorNovo">
        <label>Corretor *</label>
        <select class="inp-i" id="nCorretor">
          <option value="">Selecione o corretor...</option>
        </select>
      </div>

      <button class="btn-s" id="btnSalvarNovo" onclick="salvarNovoLead()" style="width:100%;margin-top:8px;">
        ✅ Cadastrar Lead
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="crm_auth.js"></script>
<script>
  let leads=[],funis=[],fases=[],corretores=[],view='lista';
  let corretorLogadoId=null;

  function tog(){document.getElementById('sb').classList.toggle('col');document.getElementById('main').classList.toggle('col');}

  (async()=>{
    await checkAuth();
    corretorLogadoId=await getCorretorLogado();
    if(corretorLogadoId){
      document.getElementById('navCorretores').style.display='none';
      document.getElementById('navConfig').style.display='none';
      document.getElementById('pageSub').textContent='Seus leads';
      document.getElementById('infoCorretor').style.display='block';
    }
    await init();
  })();

  async function H(){return await getHeaders();}

  async function init(){
    const leadsUrl=corretorLogadoId
      ?`${SB}/rest/v1/leads?select=*&corretor_id=eq.${corretorLogadoId}&order=created_at.desc`
      :`${SB}/rest/v1/leads?select=*&order=created_at.desc`;
    // Busca funis com permissão para o corretor logado ou todos para admin
    let funisPermitidos=[];
    if(corretorLogadoId){
      // Funis sem nenhuma restrição (não estão em funis_permissoes)
      const [todosF, permissoes] = await Promise.all([
        fetch(`${SB}/rest/v1/funis?order=ordem`,{headers:await H()}).then(r=>r.json()),
        fetch(`${SB}/rest/v1/funis_permissoes?corretor_id=eq.${corretorLogadoId}&select=funil_id`,{headers:await H()}).then(r=>r.json()),
        fetch(`${SB}/rest/v1/funis_permissoes?select=funil_id`,{headers:await H()}).then(r=>r.json()).then(d=>window._funisRestritos=d.map(x=>x.funil_id)),
      ]);
      const idsPermitidos=permissoes.map(p=>p.funil_id);
      funisPermitidos=todosF.filter(f=>
        idsPermitidos.includes(f.id) || !window._funisRestritos.includes(f.id)
      );
    }

    await Promise.all([
      fetch(leadsUrl,{headers:await H()}).then(r=>r.json()).then(d=>leads=d),
      corretorLogadoId
        ? Promise.resolve(funisPermitidos).then(d=>funis=d)
        : fetch(`${SB}/rest/v1/funis?order=ordem`,{headers:await H()}).then(r=>r.json()).then(d=>funis=d),
      fetch(`${SB}/rest/v1/fases?order=ordem`,{headers:await H()}).then(r=>r.json()).then(d=>fases=d),
      fetch(`${SB}/rest/v1/corretores?order=nome&ativo=eq.true`,{headers:await H()}).then(r=>r.json()).then(d=>corretores=d),
    ]);
    if(corretorLogadoId){
      const cor=corretores.find(c=>c.id===corretorLogadoId);
      if(cor)document.getElementById('nomeCorretorLogado').textContent='👤 '+cor.nome;
    }
    const sf=document.getElementById('fFunil');
    funis.forEach(f=>{const o=document.createElement('option');o.value=f.id;o.textContent=f.nome;sf.appendChild(o);});
    if(!corretorLogadoId){
      const sc=document.getElementById('fCor');
      corretores.forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.nome;sc.appendChild(o);});
    } else {
      document.getElementById('fCor').style.display='none';
    }
    const ors=[...new Set(leads.map(l=>l.origem).filter(Boolean))];
    const so=document.getElementById('fOr');
    ors.forEach(or=>{const o=document.createElement('option');o.value=or;o.textContent=or;so.appendChild(o);});

    // Popula funis no modal novo lead
    const snf=document.getElementById('nFunil');
    funis.forEach(f=>{const o=document.createElement('option');o.value=f.id;o.textContent=f.nome;snf.appendChild(o);});

    // Popula corretores no modal novo lead
    if(corretorLogadoId){
      // Corretor só pode criar para si mesmo — campo fixo
      const cor=corretores.find(c=>c.id===corretorLogadoId);
      const sc=document.getElementById('nCorretor');
      const o=document.createElement('option');
      o.value=cor.id;o.textContent=cor.nome;o.selected=true;
      sc.appendChild(o);
      sc.disabled=true;
    } else {
      const sc=document.getElementById('nCorretor');
      corretores.forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.nome;sc.appendChild(o);});
    }

    render();
  }

  // ── NOVO LEAD ────────────────────────────────────────
  function abrirNovoLead(){
    // Limpa campos
    ['nNome','nTelefone','nEmail','nCampanha'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('nOrigem').value='';
    document.getElementById('nFunil').value='';
    document.getElementById('nFase').innerHTML='<option value="">Selecione a fase...</option>';
    if(!corretorLogadoId) document.getElementById('nCorretor').value='';
    document.getElementById('avisoDup').style.display='none';
    document.getElementById('moNovo').classList.add('open');
  }

  function fecharNovo(){document.getElementById('moNovo').classList.remove('open');}
  function fMoNovo(e){if(e.target===document.getElementById('moNovo'))fecharNovo();}

  function atuFasesNovo(){
    const fi=document.getElementById('nFunil').value;
    const fd=fases.filter(f=>f.funil_id===fi);
    document.getElementById('nFase').innerHTML='<option value="">Selecione a fase...</option>'+
      fd.map(f=>`<option value="${f.id}">${f.nome}</option>`).join('');
  }

  function ultimos8(tel){
    const nums=tel.replace(/\D/g,'');
    return nums.slice(-8);
  }

  let _dupTimer=null;
  function verificarDuplicado(){
    const tel=document.getElementById('nTelefone').value;
    const aviso=document.getElementById('avisoDup');
    if(tel.replace(/\D/g,'').length<8){aviso.style.display='none';return;}
    // Debounce 500ms para não disparar a cada tecla
    clearTimeout(_dupTimer);
    _dupTimer=setTimeout(async()=>{
      const suf=ultimos8(tel);
      // Busca no Supabase todos os leads com telefone terminando nos mesmos 8 dígitos
      // Usa ILIKE com wildcard para comparar sufixo
      try{
        const h=await H();
        if(!h)return;
        const res=await fetch(`${SB}/rest/v1/leads?select=id,nome,telefone,fase_id,corretor_id&telefone=ilike.*${suf}`,{headers:h});
        const data=await res.json();
        if(data&&data.length>0){
          // Busca nome do corretor e fase (pode não estar em memória para corretores)
          const dup=data[0];
          // Tenta pegar da memória primeiro
          let nomeCor=gCor(dup.corretor_id)?.nome;
          let nomeFa=gFase(dup.fase_id)?.nome;
          // Se não achou (lead de outro corretor), busca no Supabase
          if(!nomeCor){
            const rc=await fetch(`${SB}/rest/v1/corretores?id=eq.${dup.corretor_id}&select=nome`,{headers:h});
            const dc=await rc.json();
            nomeCor=dc?.[0]?.nome||'outro corretor';
          }
          if(!nomeFa){
            const rf=await fetch(`${SB}/rest/v1/fases?id=eq.${dup.fase_id}&select=nome`,{headers:h});
            const df=await rf.json();
            nomeFa=df?.[0]?.nome||'sem fase';
          }
          document.getElementById('avisoDupTxt').textContent=
            `Lead já existe: ${dup.nome} — ${nomeFa} — Corretor: ${nomeCor}`;
          aviso.style.display='block';
        } else {
          aviso.style.display='none';
        }
      }catch(e){aviso.style.display='none';}
    },500);
  }

  async function salvarNovoLead(){
    const nome=document.getElementById('nNome').value.trim();
    const telefone=document.getElementById('nTelefone').value.trim();
    const email=document.getElementById('nEmail').value.trim();
    const origem=document.getElementById('nOrigem').value;
    const campanha=document.getElementById('nCampanha').value.trim();
    const funil_id=document.getElementById('nFunil').value;
    const fase_id=document.getElementById('nFase').value;
    const corretor_id=document.getElementById('nCorretor').value;

    if(!nome||!telefone||!origem||!funil_id||!fase_id||!corretor_id){
      toast('Preencha todos os campos obrigatórios!','erro');return;
    }

    // Verifica duplicado pelos 8 últimos dígitos
    const suf=ultimos8(telefone);
    const dup=leads.find(l=>(l.telefone||'').replace(/\D/g,'').slice(-8)===suf);
    if(dup){
      const cor=gCor(dup.corretor_id);
      const fa=gFase(dup.fase_id);
      toast(`Lead duplicado: ${dup.nome} já existe (${fa?.nome||''} · ${cor?.nome||''})`, 'erro');
      return;
    }

    const btn=document.getElementById('btnSalvarNovo');
    btn.disabled=true;btn.textContent='Salvando...';

    try{
      const res=await fetch(`${SB}/rest/v1/leads`,{
        method:'POST',
        headers:await H(),
        body:JSON.stringify({nome,telefone,email:email||null,origem,campanha:campanha||null,funil_id,fase_id,corretor_id})
      });
      const data=await res.json();
      if(data&&data[0]){
        leads.unshift(data[0]);
        fecharNovo();
        render();
        toast('Lead cadastrado com sucesso!');
      } else {
        toast('Erro ao cadastrar lead.','erro');
      }
    } catch(e){
      toast('Erro de conexão.','erro');
    }
    btn.disabled=false;btn.textContent='✅ Cadastrar Lead';
  }

  // ── LISTA / KANBAN ───────────────────────────────────
  function fl(){
    const b=document.getElementById('busca').value.toLowerCase();
    const fu=document.getElementById('fFunil').value;
    const co=document.getElementById('fCor').value;
    const or=document.getElementById('fOr').value;
    return leads.filter(l=>{
      if(fu&&l.funil_id!==fu)return false;
      if(co&&l.corretor_id!==co)return false;
      if(or&&l.origem!==or)return false;
      if(b){const t=`${l.nome||''} ${l.telefone||''} ${l.email||''}`.toLowerCase();if(!t.includes(b))return false;}
      return true;
    });
  }

  function render(){const lf=fl();document.getElementById('tot').textContent=`${lf.length} lead${lf.length!==1?'s':''}`;if(view==='lista')rLista(lf);else rKanban(lf);}
  function ini(n){if(!n)return'?';return n.split(' ').slice(0,2).map(x=>x[0]).join('').toUpperCase();}
  function gFunil(id){return funis.find(f=>f.id===id);}
  function gFase(id){return fases.find(f=>f.id===id);}
  function gCor(id){return corretores.find(c=>c.id===id);}
  function bc(fn){if(!fn)return'';if(fn.includes('Pré'))return'bp';if(fn.includes('Atendimento'))return'ba';if(fn.includes('Nutrição'))return'bn';return'bp';}
  function fdt(d){if(!d)return'—';return new Date(d).toLocaleDateString('pt-BR');}
  function fVal(v){
    if(!v||isNaN(v))return'—';
    const n=Number(v);
    if(n>=1000000)return'R$ '+(n/1000000).toFixed(n%1000000===0?0:1).replace('.',',')+'M';
    if(n>=1000)return'R$ '+(n/1000).toFixed(n%1000===0?0:1).replace('.',',')+'k';
    return'R$ '+n.toLocaleString('pt-BR');
  }

  function rLista(lf){
    const tb=document.getElementById('tbody');
    if(!lf.length){tb.innerHTML=`<tr><td colspan="6"><div class="empty">Nenhum lead encontrado</div></td></tr>`;return;}
    tb.innerHTML=lf.map(l=>{
      const fu=gFunil(l.funil_id),fa=gFase(l.fase_id),co=gCor(l.corretor_id);
      return `<tr onclick="abrirD('${l.id}')">
        <td><div class="li"><div class="av">${ini(l.nome)}</div><div class="ln">${l.nome||'—'}</div></div></td>
        <td><div style="font-size:13px;">${l.telefone||'—'}</div><div style="font-size:11px;color:var(--text-muted);">${l.email||''}</div></td>
        <td>${l.origem||'—'}</td>
        <td><span class="badge ${bc(fu?.nome)}">${fu?.nome||'—'}</span><div class="ft">${fa?.nome||'—'}</div></td>
        <td>${co?.nome||'—'}</td>
        <td>${l.valor_negociacao?fVal(l.valor_negociacao):'—'}</td>
        <td>${fdt(l.created_at)}</td></tr>`;
    }).join('');
  }

  function rKanban(lf){
    const fi=document.getElementById('fFunil').value;
    const c=document.getElementById('kc');
    if(!fi){c.innerHTML=`<div class="kaviso"><strong>Selecione um funil</strong>Escolha um funil no filtro para ver o kanban.</div>`;return;}
    const fd=fases.filter(f=>f.funil_id===fi);
    const board=document.createElement('div');board.className='kboard';
    fd.forEach(fase=>{
      const lf2=lf.filter(l=>l.fase_id===fase.id);
      const col=document.createElement('div');col.className='kcol';
      const hd=document.createElement('div');hd.className='kch';
      hd.innerHTML=`<span class="kcn">${fase.nome}</span><span class="kcc">${lf2.length}</span>`;
      col.appendChild(hd);
      const dz=document.createElement('div');dz.style.minHeight='60px';
      dz.addEventListener('dragover',e=>{e.preventDefault();dz.style.background='var(--acc-pale)';dz.style.borderRadius='6px';});
      dz.addEventListener('dragleave',()=>dz.style.background='');
      dz.addEventListener('drop',async e=>{e.preventDefault();dz.style.background='';const lid=e.dataTransfer.getData('lid');await mover(lid,fase.id);});
      if(!lf2.length){const v=document.createElement('div');v.style.cssText='text-align:center;padding:16px;font-size:11px;color:var(--text-muted);';v.textContent='Vazio';dz.appendChild(v);}
      else lf2.forEach(l=>{
        const co=gCor(l.corretor_id);
        const card=document.createElement('div');card.className='kcard';card.draggable=true;
        card.innerHTML=`<div class="kn">${l.nome||'—'}</div><div class="ki"><span>${l.telefone||'—'}</span><span>${co?.nome||'Sem corretor'}</span></div><div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:5px;">${l.origem?`<span class="kt">${l.origem}</span>`:''} ${l.valor_negociacao?`<span class="kv">💰 ${fVal(l.valor_negociacao)}</span>`:''}</div>`;
        card.addEventListener('dragstart',e=>{e.dataTransfer.setData('lid',l.id);card.style.opacity='.4';});
        card.addEventListener('dragend',()=>card.style.opacity='1');
        card.addEventListener('click',()=>abrirD(l.id));
        dz.appendChild(card);
      });
      col.appendChild(dz);board.appendChild(col);
    });
    c.innerHTML='';c.appendChild(board);
  }

  async function mover(lid,nfid){
    const fa=gFase(nfid);
    await fetch(`${SB}/rest/v1/leads?id=eq.${lid}`,{method:'PATCH',headers:await H(),body:JSON.stringify({fase_id:nfid,funil_id:fa?.funil_id})});
    const i=leads.findIndex(l=>l.id===lid);if(i>=0){leads[i].fase_id=nfid;leads[i].funil_id=fa?.funil_id;}
    toast('Lead movido para '+(fa?.nome||''));render();
  }

  async function abrirD(id){
    const l=leads.find(x=>x.id===id);if(!l)return;
    const fu=gFunil(l.funil_id),fa=gFase(l.fase_id),co=gCor(l.corretor_id);
    const ri=await fetch(`${SB}/rest/v1/interacoes?lead_id=eq.${id}&order=created_at.desc`,{headers:await H()});
    const ints=await ri.json();
    const oFu=funis.map(f=>`<option value="${f.id}" ${f.id===l.funil_id?'selected':''}>${f.nome}</option>`).join('');
    const oFa=fases.filter(f=>f.funil_id===l.funil_id).map(f=>`<option value="${f.id}" ${f.id===l.fase_id?'selected':''}>${f.nome}</option>`).join('');
    const oCo=corretores.map(c=>`<option value="${c.id}" ${c.id===l.corretor_id?'selected':''}>${c.nome}</option>`).join('');
    const ih=ints.length?ints.map(i=>{const c2=gCor(i.corretor_id);return`<div class="ii"><div class="iih"><span class="iit">${i.tipo||'—'}</span><span class="iid">${fdt(i.created_at)} · ${c2?.nome||'—'}</span></div><div class="iidesc">${i.descricao||''}</div></div>`;}).join(''):'<div style="text-align:center;padding:16px;color:var(--text-muted);font-size:12px;">Nenhuma interação</div>';
    const campoCorretor=corretorLogadoId
      ?`<span class="dv badge-corretor">${co?.nome||'—'}</span>`
      :`<select class="sel-i" id="eCo"><option value="">Sem corretor</option>${oCo}</select>`;
    document.getElementById('mcont').innerHTML=`
      <div class="dh"><div class="dav">${ini(l.nome)}</div><div><div class="dn">${l.nome||'—'}</div><div class="ds">${l.origem||'—'} · ${l.campanha||''}</div></div></div>
      <div class="dsec"><div class="dsec-t">Informações</div>
        <div class="dr"><span class="dk">Telefone</span><span class="dv">${l.telefone||'—'}</span></div>
        <div class="dr"><span class="dk">Email</span><span class="dv">${l.email||'—'}</span></div>
        <div class="dr"><span class="dk">Origem</span><span class="dv">${l.origem||'—'}</span></div>
        <div class="dr"><span class="dk">Campanha</span><span class="dv">${l.campanha||'—'}</span></div>
        <div class="dr"><span class="dk">Entrada</span><span class="dv">${fdt(l.created_at)}</span></div>
      </div>
      <div class="dsec"><div class="dsec-t">Gestão</div>
        <div class="dr"><span class="dk">Funil</span><select class="sel-i" id="eFu" onchange="atuFases()">${oFu}</select></div>
        <div class="dr"><span class="dk">Fase</span><select class="sel-i" id="eFa">${oFa}</select></div>
        <div class="dr"><span class="dk">Corretor</span>${campoCorretor}</div>
        <div class="dr"><span class="dk">Valor negociação</span><input class="sel-i" type="number" id="eValor" placeholder="Ex: 300000" value="${l.valor_negociacao||''}" style="width:130px;"/></div>
        <button class="btn-s" onclick="salvarG('${l.id}')">Salvar alterações</button>
      </div>
      <div class="dsec"><div class="dsec-t">Histórico</div>
        <div id="ilist">${ih}</div>
        <div class="ni">
          <select id="nTipo"><option value="">Tipo...</option><option>WhatsApp</option><option>Ligação</option><option>Email</option><option>Visita</option><option>Outro</option></select>
          <textarea id="nDesc" placeholder="Descreva a interação..."></textarea>
          <button class="btn-s" onclick="regInt('${l.id}')">Registrar</button>
        </div>
      </div>`;
    document.getElementById('mo').classList.add('open');
  }

  function atuFases(){
    const fi=document.getElementById('eFu').value;
    const fd=fases.filter(f=>f.funil_id===fi);
    document.getElementById('eFa').innerHTML=fd.map(f=>`<option value="${f.id}">${f.nome}</option>`).join('');
  }

  async function salvarG(lid){
    const d={funil_id:document.getElementById('eFu').value,fase_id:document.getElementById('eFa').value};
    if(!corretorLogadoId)d.corretor_id=document.getElementById('eCo').value||null;
    const vRaw=document.getElementById('eValor')?.value;
    d.valor_negociacao=vRaw&&!isNaN(vRaw)?Number(vRaw):null;
    await fetch(`${SB}/rest/v1/leads?id=eq.${lid}`,{method:'PATCH',headers:await H(),body:JSON.stringify(d)});
    const i=leads.findIndex(l=>l.id===lid);if(i>=0)leads[i]={...leads[i],...d};
    toast('Lead atualizado!');render();fechar();
  }

  async function regInt(lid){
    const t=document.getElementById('nTipo').value,d=document.getElementById('nDesc').value.trim();
    if(!t||!d){alert('Preencha tipo e descrição!');return;}
    await fetch(`${SB}/rest/v1/interacoes`,{method:'POST',headers:await H(),body:JSON.stringify({lead_id:lid,tipo:t,descricao:d})});
    document.getElementById('nTipo').value='';document.getElementById('nDesc').value='';
    toast('Interação registrada!');abrirD(lid);
  }

  function fMo(e){if(e.target===document.getElementById('mo'))fechar();}
  function fechar(){document.getElementById('mo').classList.remove('open');}
  function setV(v){
    view=v;
    document.getElementById('vLista').style.display=v==='lista'?'block':'none';
    document.getElementById('vKanban').style.display=v==='kanban'?'block':'none';
    document.getElementById('btnL').classList.toggle('on',v==='lista');
    document.getElementById('btnK').classList.toggle('on',v==='kanban');
    render();
  }
  function toast(m,tipo){
    const t=document.getElementById('toast');
    t.textContent=m;
    t.className='toast'+(tipo==='erro'?' erro':'');
    t.style.display='block';
    setTimeout(()=>t.style.display='none',4000);
  }
</script>
</body>
</html>
